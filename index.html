<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detektif Lokasi - Game Kuis Geografi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Special+Elite&display=swap');
        
        body {
            font-family: 'Courier Prime', monospace;
            background-color: #1a1a1a;
            color: #d1d5db;
        }
        .paper {
            background-color: #f3f4f6;
            background-image: radial-gradient(#d1d5db 1px, transparent 1px);
            background-size: 20px 20px;
            color: #1f2937;
        }
        .typewriter {
            overflow: hidden;
            border-right: .15em solid orange;
            white-space: nowrap;
            letter-spacing: .15em;
            animation: typing 3.5s steps(40, end), blink-caret .75s step-end infinite;
        }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: orange; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="game-container" class="max-w-2xl w-full bg-zinc-900 rounded-lg shadow-2xl border-2 border-zinc-700 overflow-hidden">
        <!-- Header -->
        <div class="bg-zinc-800 p-4 border-b border-zinc-700 flex justify-between items-center">
            <h1 class="text-xl font-bold text-yellow-500 tracking-widest">DETEKTIF LOKASI</h1>
            <div class="flex gap-4">
                <span id="score-display" class="bg-black px-3 py-1 rounded text-green-400 border border-green-900/50">Skor: 0</span>
                <span id="timer-display" class="bg-black px-3 py-1 rounded text-red-400 border border-red-900/50 italic">Waktu: 30s</span>
            </div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="p-8 text-center">
            <div class="mb-6 text-6xl">🕵️‍♂️</div>
            <h2 class="text-2xl font-bold mb-4 text-white">Misi Rahasia: Penjelajah Nusantara</h2>
            <p class="mb-8 text-zinc-400">Anda adalah detektif topografis. Pecahkan teka-teki fenomena geografi di Indonesia dan tentukan lokasi tepatnya sebelum waktu habis.</p>
            <button onclick="startGame()" class="bg-yellow-600 hover:bg-yellow-500 text-black font-bold py-3 px-8 rounded-full transition-transform active:scale-95">
                MULAI INVESTIGASI
            </button>
        </div>

        <!-- Game Screen (Hidden Initially) -->
        <div id="game-screen" class="hidden p-6">
            <div class="paper p-6 rounded shadow-inner mb-6 min-h-[200px] flex flex-col justify-center border-l-4 border-yellow-600">
                <p class="text-sm font-bold uppercase text-zinc-500 mb-2">Laporan Kasus #<span id="level-num">1</span></p>
                <p id="description" class="text-lg leading-relaxed italic text-zinc-800 font-serif">
                    Memuat data intelijen...
                </p>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="options-container">
                <!-- Tombol pilihan akan muncul di sini -->
            </div>
        </div>

        <!-- Result Screen (Hidden Initially) -->
        <div id="result-screen" class="hidden p-8 text-center">
            <h2 id="result-title" class="text-3xl font-bold mb-4">Misi Selesai</h2>
            <div id="result-emoji" class="text-6xl mb-4">🏆</div>
            <p id="result-message" class="mb-6 text-zinc-400"></p>
            <div class="bg-black p-4 rounded mb-6 inline-block border border-zinc-700">
                <p class="text-sm text-zinc-500 uppercase">Skor Akhir</p>
                <p id="final-score" class="text-4xl font-bold text-yellow-500">0</p>
            </div>
            <br>
            <button onclick="location.reload()" class="bg-zinc-700 hover:bg-zinc-600 text-white font-bold py-2 px-6 rounded transition">
                ULANGI MISI
            </button>
        </div>

        <!-- Feedback UI -->
        <div id="feedback" class="h-10 text-center font-bold"></div>
    </div>

    <script>
        const challenges = [
            {
                description: "Wilayah ini berada pada koordinat 8° LS dan 115° BT. Terkenal dengan fenomena batuan vulkanik 'Andesit' yang melimpah dan sistem irigasi subak yang telah diakui dunia. Komoditas pariwisatanya adalah yang tertinggi di Indonesia.",
                options: ["Bali", "Lombok", "Banyuwangi", "Manado"],
                answer: "Bali"
            },
            {
                description: "Sebuah wilayah di Papua yang memiliki fenomena geografi unik berupa puncak bersalju abadi pada ketinggian 4.884 mdpl di atas permukaan laut. Wilayah ini kaya akan komoditas tambang emas dan tembaga terbesar.",
                options: ["Pegunungan Arfak", "Mimika (Puncak Jaya)", "Wamena", "Merauke"],
                answer: "Mimika (Puncak Jaya)"
            },
            {
                description: "Lokasi ini merupakan titik paling utara di Pulau Sulawesi. Memiliki karakteristik tanah vulkanik subur yang menghasilkan komoditas Pala dan Cengkih kualitas dunia, serta dikelilingi taman laut dengan biodiversitas tertinggi.",
                options: ["Makassar", "Palu", "Minahasa (Manado)", "Gorontalo"],
                answer: "Minahasa (Manado)"
            },
            {
                description: "Wilayah ini berada di garis Khatulistiwa (0°). Fenomena geografinya meliputi hutan hujan tropis yang luas dan dialiri sungai terpanjang di Indonesia. Komoditas unggulannya adalah lidah buaya dan karet.",
                options: ["Pontianak", "Samarinda", "Palangkaraya", "Banjarmasin"],
                answer: "Pontianak"
            },
            {
                description: "Kepulauan di bagian timur yang secara historis dijuluki 'The Spice Islands'. Memiliki formasi geologi gugus pulau kecil dengan batuan karst dan vulkanik. Dahulu merupakan satu-satunya produsen buah pala di dunia.",
                options: ["Raja Ampat", "Banda Neira", "Ternate", "Kepulauan Seribu"],
                answer: "Banda Neira"
            }
        ];

        let currentLevel = 0;
        let score = 0;
        let timer;
        let timeLeft = 30;

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            loadLevel();
        }

        function loadLevel() {
            if (currentLevel >= challenges.length) {
                endGame(true);
                return;
            }

            const challenge = challenges[currentLevel];
            document.getElementById('level-num').innerText = currentLevel + 1;
            document.getElementById('description').innerText = challenge.description;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            challenge.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.className = "bg-zinc-800 hover:bg-zinc-700 border border-zinc-600 p-4 rounded text-left transition-all active:scale-95";
                btn.onclick = () => checkAnswer(opt);
                optionsContainer.appendChild(btn);
            });

            resetTimer();
        }

        function resetTimer() {
            clearInterval(timer);
            timeLeft = 30;
            updateTimerDisplay();
            timer = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    endGame(false, "Waktu Habis!");
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const display = document.getElementById('timer-display');
            display.innerText = `Waktu: ${timeLeft}s`;
            if (timeLeft < 10) display.classList.add('text-red-500');
            else display.classList.remove('text-red-500');
        }

        function checkAnswer(selected) {
            const correct = challenges[currentLevel].answer;
            const feedback = document.getElementById('feedback');
            
            if (selected === correct) {
                score += (timeLeft * 10);
                document.getElementById('score-display').innerText = `Skor: ${score}`;
                feedback.innerText = "✓ LOKASI TERKONFIRMASI!";
                feedback.className = "h-10 text-center font-bold text-green-500";
                currentLevel++;
                setTimeout(() => {
                    feedback.innerText = "";
                    loadLevel();
                }, 1000);
            } else {
                feedback.innerText = "✗ KOORDINAT SALAH!";
                feedback.className = "h-10 text-center font-bold text-red-500";
                setTimeout(() => feedback.innerText = "", 1000);
            }
        }

        function endGame(success, message) {
            clearInterval(timer);
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            const title = document.getElementById('result-title');
            const msg = document.getElementById('result-message');
            const emoji = document.getElementById('result-emoji');

            if (success) {
                title.innerText = "Detektif Legendaris!";
                msg.innerText = "Semua lokasi berhasil diidentifikasi. Anda memiliki pengetahuan geografi yang luar biasa.";
                emoji.innerText = "🏆";
            } else {
                title.innerText = "Misi Gagal";
                msg.innerText = message || "Anda kehilangan jejak di tengah jalan.";
                emoji.innerText = "❌";
            }
            
            document.getElementById('final-score').innerText = score;
        }
    </script>
</body>
</html>
